[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[project]
name = "mono-imager"
# Version is the single source of truth in mono_imager/__init__.py
# setuptools reads it dynamically — no manual version bump needed here.
dynamic = ["version"]
description = "Automated firmware flashing for Mono Gateway Routers and Dev Kit"
readme = "README.md"
authors = [{name = "H.A. Hermsen"}]
license = {text = "MIT"}
requires-python = ">=3.10"
dependencies = [
    "pyserial>=3.5",
    "icmplib>=3.0",
]

[tool.setuptools.packages.find]
include = ["mono_imager*"]

[tool.setuptools.dynamic]
version = {attr = "mono_imager.__version__"}

[project.scripts]
mono-imager = "mono_imager.cli:main"

[project.optional-dependencies]
dev = [
    "pytest>=7",
    "ruff",
    "mypy",
]

[tool.ruff]
line-length = 100
target-version = "py310"
