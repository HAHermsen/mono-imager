[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.backends.legacy:build"

[project]
name = "mono-imager"
version = "0.3.0"
description = "Automated firmware flashing for Mono Gateway Routers and Dev Kit"
authors = [{name = "H.A. Hermsen"}]
license = {text = "MIT"}
requires-python = ">=3.10"
dependencies = [
    "pyserial",
    "requests",
    "paramiko",
]

[project.scripts]
mono-imager = "mono_imager.cli:main"